<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际 2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: #0a0e27;
            background-image: radial-gradient(circle at 50% 50%, #101a40 0%, #050714 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .title {
            font-size: 36px;
            margin-bottom: 15px;
            color: #73c0ff;
            text-shadow: 0 0 10px #409eff;
        }

        .info-bar {
            font-size: 20px;
            margin: 10px 0;
            color: #ccc;
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .score {
            color: #ffd700;
            font-weight: bold;
        }

        .count {
            color: #ff9800;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .base-btn {
            padding: 12px 24px;
            font-size: 18px;
            background: #409eff;
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .base-btn:hover {
            background: #2a7dcc;
        }

        .game-wrapper {
            position: relative;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            border-radius: 15px;
            z-index: 10;
        }

        /* 放大游戏主界面 500px，操作更轻松 */
        #game-container {
            width: 500px;
            height: 500px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            background: rgba(30, 40, 80, 0.5);
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 0 30px #204080;
            position: relative;
            z-index: 2;
            touch-action: none;
        }

        .cell {
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            transition: all 0.15s ease;
            background: rgba(50, 70, 120, 0.4);
        }

        .cell-hole {
            background: #000 !important;
            box-shadow: 0 0 15px #000, inset 0 0 10px #222;
            color: transparent !important;
        }

        @keyframes holeEnter {
            0% {
                transform: scale(0.2);
                opacity: 0;
                box-shadow: 0 0 0 #000;
            }
            100% {
                transform: scale(1);
                opacity: 1;
                box-shadow: 0 0 15px #000, inset 0 0 10px #222;
            }
        }
        .cell-hole-new {
            animation: holeEnter 0.4s ease forwards;
        }

        .cell-2 { background: #234; color: #8cf; }
        .cell-4 { background: #246; color: #9df; }
        .cell-8 { background: #268; color: #aff; }
        .cell-16 { background: #28a; color: #cff; }
        .cell-32 { background: #3a8; color: #df8; }
        .cell-64 { background: #4a6; color: #ef8; }
        .cell-128 { background: #6a4; color: #fd8; }
        .cell-256 { background: #8a2; color: #fc8; }
        .cell-512 { background: #a82; color: #fa8; }
        .cell-1024 { background: #a62; color: #f88; }
        .cell-2048 { 
            background: radial-gradient(#ff6, #f80); 
            color: #fff;
            box-shadow: 0 0 20px #ff0;
        }

        .game-over-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            border-radius: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            z-index: 20;
        }

        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99;
        }
        .help-box {
            width: 90%;
            max-width: 450px;
            background: #101a40;
            border-radius: 15px;
            padding: 30px;
            color: #eee;
            line-height: 1.8;
            font-size: 18px;
        }
        .help-box h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #73c0ff;
            font-size: 24px;
        }
        .help-close {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: #409eff;
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        /* 移动端适配 */
        @media (max-width: 520px) {
            #game-container {
                width: 380px;
                height: 380px;
            }
            .cell {
                font-size: 26px;
            }
            .title {
                font-size: 28px;
            }
            .base-btn {
                padding: 8px 16px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="title">星核聚变 2048</div>
    <div class="info-bar">
        <span>分数：<span class="score" id="score">0</span></span>
        <span>有效滑动：<span class="count" id="moveCount">0</span></span>
        <span>黑洞上限：3</span>
    </div>

    <div class="btn-group">
        <button class="base-btn" id="helpBtn">游戏说明</button>
        <button class="base-btn" id="homeBtn">返回游戏大厅</button>
        <button class="base-btn" onclick="initGame()">重新开始</button>
    </div>

    <div class="game-wrapper">
        <canvas id="particle-canvas"></canvas>
        <div id="game-container"></div>
        <div class="game-over-modal" id="gameOverModal">
            <div id="overText">游戏结束</div>
            <button class="base-btn" onclick="initGame()" style="margin-top:20px">重新开始</button>
        </div>
    </div>

    <div class="mask" id="helpMask">
        <div class="help-box">
            <h3>🎮 游戏说明</h3>
            <p>1. 操作：键盘方向键 / 手机屏幕滑动</p>
            <p>2. 规则：相同数字碰撞合并翻倍</p>
            <p>3. 获胜：合成 <b>2048</b> 即可胜利</p>
            <p>4. 黑洞机制：每有效滑动10次生成1个黑洞</p>
            <p>5. 黑洞最多存在3个，超出自动删除最早的</p>
            <p>6. 黑洞可直接刷新在数字上，强制覆盖</p>
            <p>7. 数字碰到黑洞会直接消失并结算分数</p>
            <p>8. 无任何数字移动时，不计入有效滑动</p>
            <p>9. 合成2048触发粒子爆炸特效与音效</p>
            <button class="help-close" id="closeHelpBtn">关闭</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const moveCountEl = document.getElementById('moveCount');
        const gameOverModal = document.getElementById('gameOverModal');
        const overText = document.getElementById('overText');
        const particleCanvas = document.getElementById('particle-canvas');
        const ctx = particleCanvas.getContext('2d');

        const helpMask = document.getElementById('helpMask');
        const helpBtn = document.getElementById('helpBtn');
        const closeHelpBtn = document.getElementById('closeHelpBtn');
        const homeBtn = document.getElementById('homeBtn');

        const SIZE = 4;
        const MAX_HOLE = 3;
        const HOLE_STEP = 10;

        let grid = [];
        let score = 0;
        let moveCount = 0;
        let holeList = [];
        let newHolePos = null;
        let isWin = false;
        let particles = [];
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function initCanvas() {
            particleCanvas.width = gameContainer.offsetWidth;
            particleCanvas.height = gameContainer.offsetHeight;
        }

        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if(type === 'move'){
                osc.frequency.value = 220;
                gain.gain.value = 0.1;
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            }else if(type === 'merge'){
                osc.frequency.value = 440;
                gain.gain.value = 0.12;
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            }else if(type === 'boom'){
                osc.type = 'sawtooth';
                osc.frequency.value = 120;
                gain.gain.value = 0.15;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        class Particle {
            constructor(x,y){
                this.x=x;this.y=y;
                this.radius=Math.random()*4+2;
                this.vx=(Math.random()-0.5)*6;
                this.vy=(Math.random()-0.5)*6;
                this.alpha=1;
                this.color=`hsl(${Math.random()*60+30},100%,60%)`;
            }
            draw(){
                ctx.save();ctx.globalAlpha=this.alpha;
                ctx.fillStyle=this.color;
                ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
                ctx.fill();ctx.restore();
            }
            update(){
                this.x+=this.vx;this.y+=this.vy;this.alpha-=0.02;
            }
        }
        function boomEffect(){
            particles=[];
            let cx=particleCanvas.width/2,cy=particleCanvas.height/2;
            for(let i=0;i<80;i++) particles.push(new Particle(cx,cy));
            animateParticles();
        }
        function animateParticles(){
            ctx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
            for(let i=particles.length-1;i>=0;i--){
                particles[i].update();particles[i].draw();
                if(particles[i].alpha<=0) particles.splice(i,1);
            }
            if(particles.length>0) requestAnimationFrame(animateParticles);
        }

        function initGame() {
            score = 0;
            moveCount = 0;
            holeList = [];
            newHolePos = null;
            isWin = false;
            particles = [];
            scoreEl.innerText = score;
            moveCountEl.innerText = moveCount;
            gameOverModal.style.display = 'none';

            grid = Array(SIZE).fill(0).map(()=>Array(SIZE).fill(0));
            initCanvas();
            randomNewNum();
            randomNewNum();
            renderGrid();
        }

        function randomNewNum() {
            let empty = [];
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    if(grid[i][j]===0 && !isHole(i,j)){
                        empty.push({x:i,y:j});
                    }
                }
            }
            if(empty.length===0) return;
            let p = empty[Math.floor(Math.random()*empty.length)];
            grid[p.x][p.y] = Math.random()>0.5 ? 2 : 4;
        }

        function isHole(x,y){
            return holeList.some(h=>h.x===x&&h.y===y);
        }

        function addNewHole() {
            let canPlace = [];
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    if(!isHole(i,j)){
                        canPlace.push({x:i,y:j});
                    }
                }
            }
            if(canPlace.length===0) return;

            let pos = canPlace[Math.floor(Math.random()*canPlace.length)];
            newHolePos = pos;
            holeList.push(pos);

            if(holeList.length > MAX_HOLE){
                holeList.shift();
            }
            renderGrid();
        }

        function renderGrid() {
            gameContainer.innerHTML = '';
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    let cell = document.createElement('div');
                    cell.className = 'cell';

                    if(isHole(i,j)){
                        cell.classList.add('cell-hole');
                        if(newHolePos && newHolePos.x === i && newHolePos.y === j){
                            cell.classList.add('cell-hole-new');
                            setTimeout(()=> newHolePos = null, 400);
                        }
                    }else{
                        let val = grid[i][j];
                        cell.innerText = val||'';
                        if(val) cell.classList.add(`cell-${val}`);
                    }
                    gameContainer.appendChild(cell);
                }
            }
        }

        function rotate(g){
            let res = Array(SIZE).fill(0).map(()=>Array(SIZE).fill(0));
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++)
                    res[j][SIZE-1-i] = g[i][j];
            return res;
        }

        // 核心：左移 + 撞黑洞消失 + 消失加分 + 判断是否真的有移动
        function moveLeft(){
            if(isWin) return false;
            let hasRealMove = false;

            for(let i=0;i<SIZE;i++){
                let row = [];
                // 先取出本行所有数字
                for(let j=0;j<SIZE;j++){
                    if(!isHole(i,j) && grid[i][j]>0){
                        row.push(grid[i][j]);
                    }
                }
                // 合并相同数字
                for(let k=0;k<row.length-1;k++){
                    if(row[k]===row[k+1]){
                        row[k]*=2;
                        score+=row[k];
                        scoreEl.innerText=score;
                        playSound('merge');
                        row.splice(k+1,1);
                    }
                }

                // 清空本行非黑洞格子
                for(let j=0;j<SIZE;j++){
                    if(!isHole(i,j)) grid[i][j]=0;
                }

                // 向左填充，碰到黑洞直接截断，后面数字撞黑洞消失并加分
                let idx = 0;
                for(let j=0;j<SIZE;j++){
                    if(isHole(i,j)) break; // 碰到黑洞，后面数字全部消失
                    if(idx < row.length){
                        grid[i][j] = row[idx++];
                    }
                }

                // 没填充进去的数字 = 撞黑洞消失，结算分数
                while(idx < row.length){
                    score += row[idx];
                    scoreEl.innerText = score;
                    idx++;
                }
            }

            // 判断是否有真实位移
            let oldGrid = JSON.parse(JSON.stringify(grid));
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    if(oldGrid[i][j] !== grid[i][j]){
                        hasRealMove = true;
                        break;
                    }
                }
            }
            return hasRealMove;
        }

        // 修复方向键移动逻辑，每个方向单独处理
        function moveUp(){
            if(isWin) return false;
            grid=rotate(grid);grid=rotate(grid);grid=rotate(grid);
            let realMoved = moveLeft();
            grid=rotate(grid);
            return realMoved;
        }
        function moveRight(){
            if(isWin) return false;
            grid=rotate(grid);grid=rotate(grid);
            let realMoved = moveLeft();
            grid=rotate(grid);grid=rotate(grid);
            return realMoved;
        }
        function moveDown(){
            if(isWin) return false;
            grid=rotate(grid);
            let realMoved = moveLeft();
            grid=rotate(grid);grid=rotate(grid);grid=rotate(grid);
            return realMoved;
        }

        // 统一处理移动逻辑
        function handleMove(direction){
            let realMoved = false;
            switch(direction){
                case 'left': realMoved = moveLeft(); break;
                case 'up': realMoved = moveUp(); break;
                case 'right': realMoved = moveRight(); break;
                case 'down': realMoved = moveDown(); break;
            }

            // 只有真实移动了，才计数、生成黑洞
            if(realMoved){
                playSound('move');
                moveCount++;
                moveCountEl.innerText=moveCount;

                if(moveCount % HOLE_STEP === 0){
                    addNewHole();
                }

                randomNewNum();
                renderGrid();
                checkWin();
                checkGameOver();
            }
        }

        function checkWin(){
            if(isWin) return;
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    if(grid[i][j]===2048){
                        isWin=true;
                        playSound('boom');
                        boomEffect();
                        overText.innerText="恭喜合成 2048！";
                        gameOverModal.style.display='flex';
                        return;
                    }
                }
            }
        }

        function checkGameOver(){
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++)
                    if(grid[i][j]===0 && !isHole(i,j)) return;
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    let v=grid[i][j];
                    if(v===0) continue;
                    if(j+1<SIZE && !isHole(i,j+1) && grid[i][j+1]===v) return;
                    if(i+1<SIZE && !isHole(i+1,j) && grid[i+1][j]===v) return;
                }
            }
            overText.innerText="游戏结束";
            gameOverModal.style.display='flex';
        }

        // 游戏说明弹窗
        helpBtn.addEventListener('click', ()=>{
            helpMask.style.display = 'flex';
        });
        closeHelpBtn.addEventListener('click', ()=>{
            helpMask.style.display = 'none';
        });
        // 返回大厅 直接跳转指定链接
        homeBtn.addEventListener('click', ()=>{
            window.location.href = "https://red-lightstar.github.io/index.html";
        });

        // 修复键盘控制 - 核心问题解决
        document.addEventListener('keydown',e=>{
            // 阻止方向键的默认行为（如页面滚动）
            if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
                e.preventDefault();
            }
            
            switch(e.key){
                case 'ArrowUp': handleMove('up'); break;
                case 'ArrowDown': handleMove('down'); break;
                case 'ArrowLeft': handleMove('left'); break;
                case 'ArrowRight': handleMove('right'); break;
            }
        });

        // 移动端触摸
        let tx=0,ty=0;
        gameContainer.addEventListener('touchstart',e=>{
            tx=e.touches[0].clientX;
            ty=e.touches[0].clientY;
        });
        gameContainer.addEventListener('touchend',e=>{
            let ex=e.changedTouches[0].clientX;
            let ey=e.changedTouches[0].clientY;
            let dx=ex-tx,dy=ey-ty;
            if(Math.abs(dx)>Math.abs(dy)){
                if(dx>30) handleMove('right');
                else if(dx<-30) handleMove('left');
            }else{
                if(dy>30) handleMove('down');
                else if(dy<-30) handleMove('up');
            }
        });

        window.addEventListener('resize',initCanvas);
        initGame();
    </script>
</body>
</html>
