<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        /* ===== 反馈按钮 ===== */
        #feedbackBtn {
            position: fixed;
            top: 20px;
            right: 24px;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid #4a4a6a;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            color: #a0a0c0;
            transition: all 0.25s ease;
            z-index: 100;
            text-decoration: none;
        }
        #feedbackBtn:hover {
            border-color: #4ade80;
            color: #4ade80;
            background: rgba(74,222,128,0.1);
            box-shadow: 0 0 14px rgba(74,222,128,0.3);
        }
        #feedbackBtn .tooltip {
            position: absolute;
            top: 52px;
            right: 0;
            background: #23233a;
            color: #ccc;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 5px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        #feedbackBtn:hover .tooltip {
            opacity: 1;
        }

        /* ===== 主体内容 ===== */
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            color: #4ade80;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }
        .subtitle {
            color: #888;
            font-size: 18px;
            margin-bottom: 50px;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #4a4a6a;
            border-radius: 20px;
            padding: 40px;
            display: inline-block;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
        }
        .game-card:hover {
            border-color: #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
            transform: translateY(-5px);
        }
        .game-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .game-title {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .game-desc {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- 反馈图标按钮（跳转独立页面） -->
    <a href="feedback.html" id="feedbackBtn" title="意见反馈">
        💬
        <span class="tooltip">意见反馈</span>
    </a>

    <!-- 主体 -->
    <div class="container">
        <h1>🎮 游戏中心</h1>
        <p class="subtitle">选择游戏开始游玩</p>
        
        <a href="snake.html" class="game-card">
            <div class="game-icon">🐍</div>
            <div class="game-title">贪吃蛇</div>
            <div class="game-desc">经典怀旧游戏，吃掉食物变长</div>
        </a>
    </div>

</body>
</html>
