<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        #info {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            color: #fff;
            font-size: 18px;
        }
        #score {
            color: #4ade80;
        }
        #lives {
            color: #f87171;
        }
        canvas {
            border: 2px solid #4a4a6a;
            background: #0f0f23;
            display: block;
        }
        #btnContainer {
            margin-top: 15px;
        }
        #startBtn {
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #startBtn:hover {
            background: #22c55e;
        }
        #startBtn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        #hint {
            color: #888;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="info">
            <span id="score">得分: 0</span>
            <span id="lives">❤️❤️❤️</span>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="btnContainer">
            <button id="startBtn">开始游戏</button>
        </div>
        <div id="hint">使用方向键控制蛇移动</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const startBtn = document.getElementById('startBtn');

        const GRID_SIZE = 20;
        const COLS = canvas.width / GRID_SIZE;
        const ROWS = canvas.height / GRID_SIZE;

        let snake = [];
        let food = {};
        let dx = 0, dy = 0;
        let score = 0;
        let lives = 3;
        let isRunning = false;
        let gameInterval = null;

        function drawGrid() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((seg, i) => {
                ctx.fillStyle = i === 0 ? '#22c55e' : '#4ade80';
                ctx.fillRect(seg.x * GRID_SIZE, seg.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
            });
        }

        function drawFood() {
            ctx.fillStyle = '#f87171';
            ctx.fillRect(food.x * GRID_SIZE, food.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function resetSnake() {
            const cx = Math.floor(COLS / 2);
            const cy = Math.floor(ROWS / 2);
            snake = [
                {x: cx, y: cy},
                {x: cx - 1, y: cy},
                {x: cx - 2, y: cy}
            ];
            dx = 1;
            dy = 0;
        }

        function updateLives() {
            livesEl.textContent = '❤️'.repeat(lives);
        }

        function initGame() {
            score = 0;
            lives = 3;
            scoreEl.textContent = '得分: 0';
            updateLives();
            resetSnake();
            spawnFood();
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameInterval);
            startBtn.disabled = false;
            startBtn.textContent = '重新开始';
            alert(`游戏结束！最终得分: ${score}`);
        }

        function loseLife() {
            lives--;
            updateLives();
            if (lives <= 0) {
                gameOver();
            } else {
                resetSnake();
                spawnFood();
            }
        }

        function update() {
            if (!isRunning) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // 撞墙
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                loseLife();
                return;
            }

            // 撞自己
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                loseLife();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function render() {
            drawGrid();
            drawFood();
            drawSnake();
        }

        function gameLoop() {
            update();
            render();
        }

        function startGame() {
            if (isRunning) return;

            isRunning = true;
            startBtn.disabled = true;
            startBtn.textContent = '游戏中...';

            initGame();
            gameInterval = setInterval(gameLoop, 150);
        }

        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);

        // 初始画面
        drawGrid();
        ctx.fillStyle = '#4a4a6a';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('点击"开始游戏"开始', canvas.width / 2, canvas.height / 2);
    </script>
</body>
</html>
