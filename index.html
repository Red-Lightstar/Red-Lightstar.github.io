<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #game {
            text-align: center;
        }
        canvas {
            border: 2px solid #4a4a6a;
            background: #0f0f23;
            display: block;
            margin: 0 auto;
        }
        #score {
            color: #fff;
            font-size: 20px;
            margin-bottom: 10px;
        }
        #controls {
            color: #888;
            margin-top: 10px;
            font-size: 14px;
        }
        #startBtn {
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        #startBtn:hover {
            background: #22c55e;
        }
        #gameOver {
            color: #f87171;
            font-size: 18px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="score">得分: 0</div>
        <canvas id="canvas" width="400" height="400"></canvas>
        <div id="gameOver">游戏结束！</div>
        <button id="startBtn">开始游戏</button>
        <div id="controls">使用方向键控制</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const gameOverEl = document.getElementById('gameOver');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let dx = 0, dy = 0;
        let score = 0;
        let gameRunning = false;
        let gameLoop = null;
        
        function initGame() {
            // 蛇从中央开始
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 1; // 初始向右移动
            dy = 0;
            score = 0;
            scoreEl.textContent = '得分: 0';
            gameOverEl.style.display = 'none';
            placeFood();
        }
        
        function drawGame() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 画蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#22c55e'; // 蛇头
                } else {
                    ctx.fillStyle = '#4ade80'; // 蛇身
                }
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, 
                           gridSize - 2, gridSize - 2);
            });
            
            // 画食物
            ctx.fillStyle = '#f87171';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, 
                       gridSize - 2, gridSize - 2);
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || 
                head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }
            
            // 撞自己检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }
            
            snake.unshift(head);
            
            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                placeFood();
            } else {
                snake.pop();
            }
        }
        
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }
        
        function startGame() {
            if (gameRunning) return;
            
            gameRunning = true;
            startBtn.textContent = '游戏中...';
            startBtn.disabled = true;
            startBtn.style.background = '#6b7280';
            
            initGame();
            
            gameLoop = setInterval(() => {
                updateGame();
                drawGame();
            }, 100);
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            gameOverEl.style.display = 'block';
            startBtn.textContent = '重新开始';
            startBtn.disabled = false;
            startBtn.style.background = '#4ade80';
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp': 
                    if (dy === 0) { dx = 0; dy = -1; } 
                    break;
                case 'ArrowDown': 
                    if (dy === 0) { dx = 0; dy = 1; } 
                    break;
                case 'ArrowLeft': 
                    if (dx === 0) { dx = -1; dy = 0; } 
                    break;
                case 'ArrowRight': 
                    if (dx === 0) { dx = 1; dy = 0; } 
                    break;
            }
        });
        
        startBtn.addEventListener('click', startGame);
        
        // 初始画面
        ctx.fillStyle = '#0f0f23';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#4a4a6a';
        ctx.font = '20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('点击"开始游戏"', canvas.width/2, canvas.height/2 - 10);
        ctx.fillText('开始贪吃蛇', canvas.width/2, canvas.height/2 + 20);
    </script>
</body>
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #game {
            text-align: center;
        }
        canvas {
            border: 2px solid #4a4a6a;
            background: #0f0f23;
            display: block;
            margin: 0 auto;
        }
        #score {
            color: #fff;
            font-size: 20px;
            margin-bottom: 10px;
        }
        #lives {
            color: #f87171;
            font-size: 18px;
            margin-bottom: 10px;
        }
        #controls {
            color: #888;
            margin-top: 10px;
            font-size: 14px;
        }
        #startBtn {
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        #startBtn:hover {
            background: #22c55e;
        }
        #gameOver {
            color: #f87171;
            font-size: 18px;
            margin-top: 10px;
            display: none;
        }
        .heart {
            color: #f87171;
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="score">得分: 0</div>
        <div id="lives">血量: <span class="heart">❤️❤️❤️</span></div>
        <canvas id="canvas" width="600" height="600"></canvas>
        <div id="gameOver">游戏结束！</div>
        <button id="startBtn">开始游戏</button>
        <div id="controls">使用方向键控制</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const startBtn = document.getElementById('startBtn');
        const gameOverEl = document.getElementById('gameOver');
        
        const gridSize = 20;
        const tileCountX = canvas.width / gridSize;  // 30格
        const tileCountY = canvas.height / gridSize; // 30格
        
        let snake = [];
        let food = {};
        let dx = 0, dy = 0;
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let gameLoop = null;
        
        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < lives; i++) {
                hearts += '❤️';
            }
            livesEl.innerHTML = `血量: <span class="heart">${hearts}</span>`;
        }
        
        function initGame() {
            // 蛇从中央开始
            const startX = Math.floor(tileCountX / 2);
            const startY = Math.floor(tileCountY / 2);
            snake = [
                {x: startX, y: startY},
                {x: startX - 1, y: startY},
                {x: startX - 2, y: startY}
            ];
            dx = 1; // 初始向右移动
            dy = 0;
            score = 0;
            lives = 3;
            scoreEl.textContent = '得分: 0';
            updateLivesDisplay();
            gameOverEl.style.display = 'none';
            placeFood();
        }
        
        function drawGame() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 画蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#22c55e'; // 蛇头
                } else {
                    ctx.fillStyle = '#4ade80'; // 蛇身
                }
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, 
                           gridSize - 2, gridSize - 2);
            });
            
            // 画食物
            ctx.fillStyle = '#f87171';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, 
                       gridSize - 2, gridSize - 2);
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 撞墙检测
            if (head.x < 0 || head.x >= tileCountX || 
                head.y < 0 || head.y >= tileCountY) {
                loseLife();
                return;
            }
            
            // 撞自己检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                loseLife();
                return;
            }
            
            snake.unshift(head);
            
            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                placeFood();
            } else {
                snake.pop();
            }
        }
        
        function loseLife() {
            lives--;
            updateLivesDisplay();
            
            if (lives <= 0) {
                endGame();
            } else {
                // 重置蛇的位置，保留得分
                const startX = Math.floor(tileCountX / 2);
                const startY = Math.floor(tileCountY / 2);
                snake = [
                    {x: startX, y: startY},
                    {x: startX - 1, y: startY},
                    {x: startX - 2, y: startY}
                ];
                dx = 1;
                dy = 0;
                placeFood();
            }
        }
        
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCountX),
                    y: Math.floor(Math.random() * tileCountY)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }
        
        function startGame() {
            if (gameRunning) return;
            
            gameRunning = true;
            startBtn.textContent = '游戏中...';
            startBtn.disabled = true;
            startBtn.style.background = '#6b7280';
            
            initGame();
            
            gameLoop = setInterval(() => {
                updateGame();
                drawGame();
            }, 150); // 速度变慢（150ms，原来是100ms）
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            gameOverEl.textContent = `游戏结束！最终得分: ${score}`;
            gameOverEl.style.display = 'block';
            startBtn.textContent = '重新开始';
            startBtn.disabled = false;
            startBtn.style.background = '#4ade80';
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp': 
                    if (dy === 0) { dx = 0; dy = -1; } 
                    break;
                case 'ArrowDown': 
                    if (dy === 0) { dx = 0; dy = 1; } 
                    break;
                case 'ArrowLeft': 
                    if (dx === 0) { dx = -1; dy = 0; } 
                    break;
                case 'ArrowRight': 
                    if (dx === 0) { dx = 1; dy = 0; } 
                    break;
            }
        });
        
        startBtn.addEventListener('click', startGame);
        
        // 初始画面
        ctx.fillStyle = '#0f0f23';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#4a4a6a';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('点击"开始游戏"', canvas.width/2, canvas.height/2 - 15);
        ctx.font = '18px Arial';
        ctx.fillText('开始贪吃蛇', canvas.width/2, canvas.height/2 + 20);
    </script>
</body>
