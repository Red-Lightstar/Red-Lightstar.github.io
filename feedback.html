<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意见反馈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 30px 20px;
        }

        /* ===== 顶部导航 ===== */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 560px;
            margin-bottom: 30px;
        }
        #title {
            color: #4ade80;
            font-size: 22px;
            text-decoration: none;
        }
        #backBtn {
            background: #4a4a6a;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }
        #backBtn:hover {
            background: #6b6b8a;
        }

        /* ===== 主面板 ===== */
        #panel {
            background: #1e1e38;
            border: 1.5px solid #3a3a5a;
            border-radius: 16px;
            padding: 36px 40px 32px;
            width: 100%;
            max-width: 560px;
        }

        #panel h1 {
            color: #4ade80;
            font-size: 22px;
            margin-bottom: 6px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
        }

        /* 类型选择 */
        .type-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .type-btn {
            flex: 1;
            min-width: 100px;
            padding: 10px 0;
            border-radius: 10px;
            border: 1.5px solid #3a3a5a;
            background: transparent;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .type-btn:hover {
            border-color: #4ade80;
            color: #4ade80;
        }
        .type-btn.selected {
            border-color: #4ade80;
            color: #4ade80;
            background: rgba(74,222,128,0.1);
        }

        /* 输入框 */
        #feedbackText {
            width: 100%;
            height: 130px;
            background: #13132a;
            border: 1.5px solid #3a3a5a;
            border-radius: 10px;
            color: #ddd;
            font-size: 14px;
            padding: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        #feedbackText:focus {
            border-color: #4ade80;
        }
        #feedbackText::placeholder {
            color: #555;
        }

        .char-count {
            text-align: right;
            color: #555;
            font-size: 12px;
            margin-top: 6px;
            margin-bottom: 20px;
        }

        /* 提交按钮 */
        #submitBtn {
            width: 100%;
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 13px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #submitBtn:hover {
            background: #22c55e;
        }
        #submitBtn:disabled {
            background: #3a3a5a;
            color: #666;
            cursor: not-allowed;
        }

        /* 成功提示 */
        #successMsg {
            display: none;
            text-align: center;
            padding: 30px 0 10px;
        }
        #successMsg .icon {
            font-size: 52px;
            margin-bottom: 12px;
        }
        #successMsg p {
            color: #4ade80;
            font-size: 17px;
        }
        #successMsg .sub2 {
            color: #666;
            font-size: 13px;
            margin-top: 6px;
        }

        /* ===== 历史留言 ===== */
        #historySection {
            width: 100%;
            max-width: 560px;
            margin-top: 30px;
        }
        #historyTitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #clearBtn {
            margin-left: auto;
            background: none;
            border: 1px solid #3a3a5a;
            color: #666;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #clearBtn:hover {
            border-color: #f87171;
            color: #f87171;
        }
        #historyList {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .record-card {
            background: #1e1e38;
            border: 1px solid #2e2e4a;
            border-radius: 12px;
            padding: 16px 18px;
            animation: slideIn 0.2s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .record-type {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(74,222,128,0.1);
            color: #4ade80;
            border: 1px solid rgba(74,222,128,0.3);
        }
        .record-type.bug {
            background: rgba(248,113,113,0.1);
            color: #f87171;
            border-color: rgba(248,113,113,0.3);
        }
        .record-type.love {
            background: rgba(251,191,36,0.1);
            color: #fbbf24;
            border-color: rgba(251,191,36,0.3);
        }
        .record-type.other {
            background: rgba(167,139,250,0.1);
            color: #a78bfa;
            border-color: rgba(167,139,250,0.3);
        }
        .record-time {
            color: #555;
            font-size: 11px;
        }
        .record-content {
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-all;
        }
        #noRecord {
            color: #444;
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div id="header">
        <a href="index.html" id="title">← 游戏中心</a>
        <a href="index.html" id="backBtn">返回主页</a>
    </div>

    <!-- 反馈面板 -->
    <div id="panel">
        <h1>💬 意见反馈</h1>
        <p class="subtitle">你的建议是我进步的动力，欢迎留言！</p>

        <!-- 填写区 -->
        <div id="formArea">
            <div class="type-row">
                <button class="type-btn selected" data-type="建议">💡 建议</button>
                <button class="type-btn" data-type="Bug">🐛 Bug</button>
                <button class="type-btn" data-type="夸夸">🌟 夸夸</button>
                <button class="type-btn" data-type="其他">💭 其他</button>
            </div>

            <textarea id="feedbackText" placeholder="请在这里输入你的留言或建议…" maxlength="300"></textarea>
            <div class="char-count"><span id="charNum">0</span> / 300</div>

            <button id="submitBtn" disabled>提交反馈</button>
        </div>

        <!-- 成功提示 -->
        <div id="successMsg">
            <div class="icon">✅</div>
            <p>反馈已收到，感谢你的留言！</p>
            <p class="sub2">我会认真阅读每一条建议 💚</p>
        </div>
    </div>

    <!-- 历史留言 -->
    <div id="historySection">
        <div id="historyTitle">
            📋 历史留言
            <button id="clearBtn">清空记录</button>
        </div>
        <div id="historyList"></div>
    </div>

    <script>
        const typeButtons  = document.querySelectorAll('.type-btn');
        const feedbackText = document.getElementById('feedbackText');
        const charNum      = document.getElementById('charNum');
        const submitBtn    = document.getElementById('submitBtn');
        const formArea     = document.getElementById('formArea');
        const successMsg   = document.getElementById('successMsg');
        const historyList  = document.getElementById('historyList');
        const clearBtn     = document.getElementById('clearBtn');

        let selectedType = '建议';

        // 类型切换
        typeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                typeButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedType = btn.dataset.type;
            });
        });

        // 字数统计
        feedbackText.addEventListener('input', () => {
            charNum.textContent = feedbackText.value.length;
            submitBtn.disabled = feedbackText.value.trim().length === 0;
        });

        // 提交
        submitBtn.addEventListener('click', () => {
            const content = feedbackText.value.trim();
            if (!content) return;

            const records = JSON.parse(localStorage.getItem('feedbacks') || '[]');
            records.unshift({
                type: selectedType,
                content,
                time: new Date().toLocaleString('zh-CN')
            });
            localStorage.setItem('feedbacks', JSON.stringify(records));

            formArea.style.display = 'none';
            successMsg.style.display = 'block';

            renderHistory();

            setTimeout(() => {
                formArea.style.display = '';
                successMsg.style.display = 'none';
                feedbackText.value = '';
                charNum.textContent = '0';
                submitBtn.disabled = true;
            }, 2500);
        });

        // 渲染历史记录
        function renderHistory() {
            const records = JSON.parse(localStorage.getItem('feedbacks') || '[]');

            if (records.length === 0) {
                historyList.innerHTML = '<div id="noRecord">暂无留言记录</div>';
                return;
            }

            historyList.innerHTML = records.map(r => {
                const typeClass = r.type === 'Bug' ? 'bug'
                                : r.type === '夸夸' ? 'love'
                                : r.type === '其他' ? 'other' : '';
                return `
                    <div class="record-card">
                        <div class="record-header">
                            <span class="record-type ${typeClass}">${r.type}</span>
                            <span class="record-time">${r.time}</span>
                        </div>
                        <div class="record-content">${escHtml(r.content)}</div>
                    </div>
                `;
            }).join('');
        }

        // HTML 转义防注入
        function escHtml(str) {
            return str.replace(/&/g,'&amp;')
                       .replace(/</g,'&lt;')
                       .replace(/>/g,'&gt;')
                       .replace(/"/g,'&quot;')
                       .replace(/\n/g,'<br>');
        }

        // 清空记录
        clearBtn.addEventListener('click', () => {
            if (confirm('确定要清空所有留言记录吗？')) {
                localStorage.removeItem('feedbacks');
                renderHistory();
            }
        });

        // 初始化
        renderHistory();
    </script>
</body>
</html>
