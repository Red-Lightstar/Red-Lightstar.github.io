<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意见反馈</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部 */
        #header {
            width: 100%;
            max-width: 560px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        #title {
            color: #4ade80;
            font-size: 20px;
            text-decoration: none;
        }
        #backBtn {
            background: #4a4a6a;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
        }
        #backBtn:hover { background: #6b6b8a; }

        /* 主面板 */
        #panel {
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 14px;
            padding: 28px 32px;
            width: 100%;
            max-width: 560px;
            margin-bottom: 20px;
        }
        #panel h2 {
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 14px;
        }

        /* 输入框 */
        #msgInput {
            width: 100%;
            height: 100px;
            background: #13132a;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            color: #ddd;
            font-size: 14px;
            padding: 12px;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        #msgInput:focus { border-color: #4ade80; }
        #msgInput::placeholder { color: #555; }

        /* 提交按钮 */
        #submitBtn {
            margin-top: 12px;
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 10px 28px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        #submitBtn:hover { background: #22c55e; }

        /* 成功提示 */
        #successHint {
            display: none;
            color: #4ade80;
            font-size: 13px;
            margin-top: 10px;
        }

        /* 历史留言 */
        #historyTitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 560px;
        }
        #list {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg-card {
            background: #1e1e38;
            border: 1px solid #2e2e4a;
            border-radius: 10px;
            padding: 14px 16px;
        }
        .msg-meta {
            color: #555;
            font-size: 11px;
            margin-bottom: 6px;
        }
        .msg-text {
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-all;
        }
        #noMsg {
            color: #444;
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div id="header">
        <a href="index.html" id="title">← 游戏中心</a>
        <a href="index.html" id="backBtn">返回主页</a>
    </div>

    <div id="panel">
        <h2>💬 留言反馈</h2>
        <textarea id="msgInput" placeholder="想说点什么？留下你的建议吧…"></textarea>
        <button id="submitBtn">提交留言</button>
        <div id="successHint">✅ 感谢留言，已收到！</div>
    </div>

    <div id="historyTitle">📋 全部留言</div>
    <div id="list"></div>

    <script>
        const msgInput   = document.getElementById('msgInput');
        const submitBtn  = document.getElementById('submitBtn');
        const successHint = document.getElementById('successHint');
        const list       = document.getElementById('list');

        // 提交
        submitBtn.addEventListener('click', () => {
            const text = msgInput.value.trim();
            if (!text) return;

            const msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            msgs.unshift({
                text,
                time: new Date().toLocaleString('zh-CN')
            });
            localStorage.setItem('msgs', JSON.stringify(msgs));

            msgInput.value = '';
            successHint.style.display = 'block';
            render();

            setTimeout(() => { successHint.style.display = 'none'; }, 2000);
        });

        // 渲染
        function render() {
            const msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            if (msgs.length === 0) {
                list.innerHTML = '<div id="noMsg">暂无留言，快来抢沙发吧 ✨</div>';
                return;
            }
            list.innerHTML = msgs.map(m => `
                <div class="msg-card">
                    <div class="msg-meta">${m.time}</div>
                    <div class="msg-text">${m.text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
