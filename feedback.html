<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意见反馈</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部 */
        #header {
            width: 100%;
            max-width: 560px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        #title {
            color: #4ade80;
            font-size: 20px;
            text-decoration: none;
        }
        #backBtn {
            background: #4a4a6a;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
        }
        #backBtn:hover { background: #6b6b8a; }


        #panel {
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 14px;
            padding: 28px 32px;
            width: 100%;
            max-width: 560px;
            margin-bottom: 20px;
        }
        #panel h2 {
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 14px;
            cursor: default;
        }

        /* 服务器状态 */
        #serverStatus {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 14px;
        }
        #serverStatus.online {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        #serverStatus.offline {
            background: rgba(255, 100, 100, 0.1);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.3);
        }

        /* 输入框 */
        #msgInput {
            width: 100%;
            height: 100px;
            background: #13132a;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            color: #ddd;
            font-size: 14px;
            padding: 12px;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        #msgInput:focus { border-color: #4ade80; }
        #msgInput::placeholder { color: #555; }

        /* 提交按钮 */
        #submitBtn {
            margin-top: 12px;
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 10px 28px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        #submitBtn:hover { background: #22c55e; }
        #submitBtn:disabled { background: #555; cursor: not-allowed; }

        /* 成功提示 */
        #successHint {
            display: none;
            color: #4ade80;
            font-size: 13px;
            margin-top: 10px;
        }

        /* 历史留言 */
        #historyTitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 560px;
        }
        #list {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg-card {
            background: #1e1e38;
            border: 1px solid #2e2e4a;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .msg-content { flex: 1; }
        .msg-meta { color: #555; font-size: 11px; margin-bottom: 6px; }
        .msg-text { color: #ccc; font-size: 14px; line-height: 1.6; word-break: break-all; }
        #noMsg { color: #444; font-size: 13px; text-align: center; padding: 20px 0; }

        /* 刷新按钮 */
        #refreshBtn {
            background: #2e2e4a;
            color: #888;
            border: 1px solid #3a3a5a;
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
        }
        #refreshBtn:hover { background: #3a3a5a; }

        /* 清空按钮 */
        #clearBtn {
            background: #4a2e2e;
            color: #ff6464;
            border: 1px solid #5a3a3a;
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
            display: none;
        }
        #clearBtn.show { display: inline-block; }
        #clearBtn:hover { background: #5a3a3a; }

        /* 删除按钮 */
        .deleteBtn {
            background: transparent;
            color: #555;
            border: 1px solid #3a3a5a;
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
            display: none;
        }
        .deleteBtn.show { display: inline-block; }
        .deleteBtn:hover {
            background: #ff6464;
            color: #fff;
            border-color: #ff6464;
        }
    </style>
</head>
<body>

    <div id="header">
        <a href="index.html" id="title">← 游戏中心</a>
        <a href="index.html" id="backBtn">返回主页</a>
    </div>

    <div id="panel">
        <h2 id="panelTitle">💬 留言反馈</h2>
        <div id="serverStatus" class="offline">🔄 正在连接服务器...</div>
        <textarea id="msgInput" placeholder="想说点什么？留下你的建议吧…"></textarea>
        <button id="submitBtn">提交留言</button>
        <div id="successHint">✅ 感谢留言，已收到！</div>
    </div>

    <div id="historyTitle">
        📋 全部留言
        <button id="refreshBtn">🔄 刷新</button>
        <button id="clearBtn">🗑️ 清空</button>
    </div>

    <div id="list"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ==========================================
        // ⚙️ Supabase 配置（永久地址，不用再改）
        // ==========================================
        const SUPABASE_URL = 'https://ujpvdztgntjkhqaecpjt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ZGBIkuOZeeGKW3sJzxCAAw__jjtiueV';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 管理员密码（改成一个你自己记得的密码）
        const ADMIN_PASSWORD = 'your_password_here';
        // ==========================================

        // ===== 隐藏管理入口：点击"留言反馈"标题6次触发 =====
        let secretClicks = 0;
        const panelTitle = document.getElementById('panelTitle');
        panelTitle.addEventListener('click', () => {
            secretClicks++;
            if (secretClicks >= 6) {
                secretClicks = 0;
                const pwd = prompt('请输入管理密码：');
                if (pwd) checkAdmin(pwd);
            }
        });

        const msgInput      = document.getElementById('msgInput');
        const submitBtn     = document.getElementById('submitBtn');
        const successHint   = document.getElementById('successHint');
        const list          = document.getElementById('list');
        const serverStatus  = document.getElementById('serverStatus');
        const refreshBtn    = document.getElementById('refreshBtn');
        const clearBtn      = document.getElementById('clearBtn');

        let isAdmin = false;
        let serverOnline = false;

        // 页面加载时：若已有保存的密码，自动验证
        const savedPwd = localStorage.getItem('adminPwd');
        if (savedPwd) {
            checkAdmin(savedPwd);
        }

        // 检查服务器状态
        async function checkServer() {
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('id', { count: 'exact', head: true });
                if (!error) {
                    serverOnline = true;
                    serverStatus.className = 'online';
                    serverStatus.textContent = '✅ 服务器已连接';
                    return true;
                }
            } catch (e) { /* ignore */ }
            serverOnline = false;
            serverStatus.className = 'offline';
            serverStatus.textContent = '❌ 服务器未连接';
            return false;
        }

        // 提交留言
        async function submitMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            try {
                const { data, error } = await supabase
                    .from('messages')
                    .insert({ text: text, offline: false })
                    .select();

                if (!error) {
                    msgInput.value = '';
                    successHint.style.display = 'block';
                    await loadMessages();
                    setTimeout(() => { successHint.style.display = 'none'; }, 3000);
                } else {
                    alert('提交失败：' + error.message);
                }
            } catch (e) {
                alert('网络错误，请检查网络连接');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = '提交留言';
        }

        submitBtn.addEventListener('click', submitMessage);
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitMessage();
            }
        });

        // 加载留言
        async function loadMessages() {
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (!error) {
                    renderMessages(data || []);
                    return;
                }
            } catch (e) { /* ignore */ }

            // 失败时显示本地缓存
            renderLocal();
        }

        function renderLocal() {
            const msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            renderMessages(msgs);
        }

        function renderMessages(msgs) {
            if (msgs.length === 0) {
                list.innerHTML = '<div id="noMsg">暂无留言，快来抢沙发吧 ✨</div>';
                return;
            }
            list.innerHTML = msgs.map(m => {
                const timeStr = m.created_at
                    ? new Date(m.created_at).toLocaleString('zh-CN')
                    : (m.time || '');
                const isOffline = m.offline;
                return `
                <div class="msg-card">
                    <div class="msg-content">
                        <div class="msg-meta">${timeStr}${isOffline ? ' 📴(离线)' : ''}</div>
                        <div class="msg-text">${(m.text || '').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
                    </div>
                    ${m.id ? `<button class="deleteBtn${isAdmin ? ' show' : ''}" onclick="deleteMessage('${m.id}')">删除</button>` : ''}
                </div>
                `;
            }).join('');
        }

        // 验证管理员密码
        function checkAdmin(pwd) {
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem('adminPwd', pwd);
                panelTitle.textContent = '🔓 留言反馈（已解锁）';
                document.querySelectorAll('.deleteBtn').forEach(b => b.classList.add('show'));
                clearBtn.classList.add('show');
                loadMessages();
            } else {
                isAdmin = false;
                localStorage.removeItem('adminPwd');
                alert('❌ 密码错误');
            }
        }

        // 删除留言
        window.deleteMessage = async function(id) {
            if (!isAdmin) { alert('请先验证管理密码'); return; }
            if (!confirm('确定删除这条留言？')) return;
            try {
                const { error } = await supabase
                    .from('messages')
                    .delete()
                    .eq('id', id);
                if (!error) {
                    await loadMessages();
                } else {
                    alert('删除失败');
                }
            } catch (e) {
                alert('网络错误');
            }
        };

        // 清空全部
        async function clearAll() {
            if (!isAdmin) { alert('请先验证管理密码'); return; }
            if (!confirm('确定清空全部留言？此操作不可恢复！')) return;
            if (!confirm('再次确认：清空后无法恢复，确定吗？')) return;
            try {
                const { error } = await supabase
                    .from('messages')
                    .delete()
                    .neq('id', '00000000-0000-0000-0000-000000000000'); // 删除全部
                if (!error) {
                    await loadMessages();
                } else {
                    alert('清空失败');
                }
            } catch (e) {
                alert('清空失败');
            }
        }

        clearBtn.addEventListener('click', clearAll);
        refreshBtn.addEventListener('click', async () => {
            refreshBtn.textContent = '🔄 刷新中...';
            await checkServer();
            await loadMessages();
            refreshBtn.textContent = '🔄 刷新';
        });

        (async () => {
            await checkServer();
            await loadMessages();
        })();
    </script>
</body>
</html>
