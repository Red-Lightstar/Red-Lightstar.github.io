<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Plane</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 顶部 */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 420px;
            margin-bottom: 14px;
        }
        #title { color: #4ade80; font-size: 22px; text-decoration: none; }
        #backBtn {
            background: #4a4a6a; color: #fff; border: none;
            padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px;
            text-decoration: none; transition: background 0.2s;
        }
        #backBtn:hover { background: #6b6b8a; }

        /* 信息栏 */
        #infoBar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 420px;
        }
        #scoreDisplay, #bestDisplay {
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 8px 24px;
            color: #4ade80;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }
        #bestDisplay { color: #fbbf24; }

        /* Canvas */
        canvas {
            border: 2px solid #3a3a5a;
            border-radius: 10px;
            display: block;
            cursor: pointer;
        }

        /* 提示 */
        #hint {
            color: #555;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        #hint span { color: #888; }
    </style>
</head>
<body>

    <div id="header">
        <a href="index.html" id="title">← 游戏中心</a>
        <a href="index.html" id="backBtn">返回主页</a>
    </div>

    <div id="infoBar">
        <div id="scoreDisplay">🏆 0</div>
        <div id="bestDisplay">👑 0</div>
    </div>

    <canvas id="gameCanvas" width="400" height="560"></canvas>

    <div id="hint">
        <span>点击</span> 或 <span>空格键</span> 让飞机飞起来，不要撞上哦！
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');

        const GRAVITY = 0.3;
        const FLAP = -6.5;
        const PIPE_W = 60;
        const PIPE_GAP = 165;
        const PIPE_SPEED = 2.5;
        const PIPE_INTERVAL = 110;

        // =============================================
        //  ✈️ 飞机图片配置
        // =============================================
        const PLANE_IMG_SRC = '飞机_clean.png'; // ← 去掉天空背景的飞机图片
        const PLANE_WIDTH   = 120;          // ← 显示宽度（像素）
        const PLANE_HEIGHT  = 60;           // ← 显示高度（像素）
        const BIRD_RADIUS   = 16;           // ← 碰撞检测半径
        // =============================================

        // 预加载飞机图片
        const planeImg = new Image();
        planeImg.onerror = function() {
            console.warn('飞机图片加载失败！请检查文件是否存在：' + PLANE_IMG_SRC);
        };
        planeImg.onload = function() {
            console.log('飞机图片加载成功！尺寸：' + this.naturalWidth + 'x' + this.naturalHeight);
        };
        planeImg.src = PLANE_IMG_SRC + '?t=' + Date.now();

        // =============================================
        //  🏢 管道替换为塔图片配置
        // =============================================
        const TOWER_IMG_SRC = '塔_nobg.png';  // ← 去掉背景的塔图片
        const TOWER_WIDTH   = 70;             // ← 塔在管道位置的显示宽度
        const TOWER_CAP_W   = 82;             // ← 塔帽檐宽度（比主体略宽）
        const TOWER_CAP_H   = 30;             // ← 塔帽檐高度
        // =============================================

        // 预加载塔图片
        const towerImg = new Image();
        towerImg.onerror = function() {
            console.warn('塔图片加载失败！请检查文件是否存在：' + TOWER_IMG_SRC);
        };
        towerImg.onload = function() {
            console.log('塔图片加载成功！尺寸：' + this.naturalWidth + 'x' + this.naturalHeight);
        };
        towerImg.src = TOWER_IMG_SRC + '?t=' + Date.now(); // 加时间戳防缓存

        let bird, pipes, score, best, gameState, pipeTimer, animId;
        let frameCount = 0;
        let startPlaneY = canvas.height / 2; // 开始界面飞机初始Y坐标
        let startPlaneFloat = 0; // 开始界面飞机浮动动画参数

        // =============================================
        //  💥 爆炸粒子系统
        // =============================================
        let particles = [];

        // 🔥 创建火焰爆炸
        function createExplosion(x, y) {
            // 火焰核心（明亮，小而集中）
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * 1.5;
                particles.push({
                    x: x + (Math.random() - 0.5) * 10,
                    y: y + (Math.random() - 0.5) * 10,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1.5,
                    radius: 6 + Math.random() * 8,
                    life: 1.0,
                    decay: 0.025 + Math.random() * 0.015,
                    type: 'core'
                });
            }
            // 火焰外层（橙红色，中等大小）
            for (let i = 0; i < 6; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 2;
                particles.push({
                    x: x + (Math.random() - 0.5) * 15,
                    y: y + (Math.random() - 0.5) * 15,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    radius: 10 + Math.random() * 12,
                    life: 0.8,
                    decay: 0.02 + Math.random() * 0.01,
                    type: 'flame'
                });
            }
            // 黑烟（上升扩散）
            for (let i = 0; i < 4; i++) {
                particles.push({
                    x: x + (Math.random() - 0.5) * 20,
                    y: y - 10,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: -0.5 - Math.random() * 1,
                    radius: 12 + Math.random() * 10,
                    life: 0.6,
                    decay: 0.008 + Math.random() * 0.005,
                    type: 'smoke'
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                // 火焰向上飘
                if (p.type === 'core' || p.type === 'flame') {
                    p.vy -= 0.03;
                }
                // 烟雾向上加速
                if (p.type === 'smoke') {
                    p.vy -= 0.01;
                    p.radius += 0.3;
                }
                p.vx *= 0.98;
                p.life -= p.decay;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);

                if (p.type === 'core') {
                    // 火焰核心：黄白色，径向渐变
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                    grad.addColorStop(0, `rgba(255,255,220,${p.life})`);
                    grad.addColorStop(0.4, `rgba(255,220,80,${p.life * 0.8})`);
                    grad.addColorStop(1, 'rgba(255,120,0,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'flame') {
                    // 火焰外层：橙红色渐变
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                    grad.addColorStop(0, `rgba(255,160,30,${p.life * 0.7})`);
                    grad.addColorStop(0.5, `rgba(220,60,10,${p.life * 0.5})`);
                    grad.addColorStop(1, 'rgba(100,20,0,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'smoke') {
                    // 黑烟
                    ctx.fillStyle = `rgba(40,40,40,${p.life * 0.4})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        best = +localStorage.getItem('flappyBest') || 0;
        bestDisplay.textContent = `👑 ${best}`;

        // 游戏状态枚举：ready(待机)/playing(游戏中)/gameOver(结束)
        const GAME_STATE = {
            READY: 'ready',
            PLAYING: 'playing',
            GAME_OVER: 'gameOver'
        };

        function init() {
            bird = { x: 70, y: canvas.height / 2, vy: 0, rotation: 0 };
            pipes = [];
            score = 0;
            gameState = GAME_STATE.READY; // 初始化为待机状态
            scoreDisplay.textContent = `🏆 ${score}`;
            frameCount = 0;
            particles = [];
            cancelAnimationFrame(animId); // 清除之前的动画帧
            draw(); // 绘制初始待机界面
        }

        // 绘制开始界面的飞机（图片版）
        function drawStartPlane() {
            ctx.save();
            // 计算浮动动画：正弦曲线实现上下轻微浮动
            startPlaneFloat += 0.05;
            const floatY = Math.sin(startPlaneFloat) * 8; // 浮动幅度8px
            const drawX = bird.x - PLANE_WIDTH / 4; // 调整X坐标居中
            const drawY = startPlaneY + floatY - PLANE_HEIGHT / 4; // 调整Y坐标居中

            if (planeImg.complete && !planeImg.error) {
                // 图片加载成功：绘制飞机图片
                ctx.drawImage(
                    planeImg,
                    drawX, drawY, // 绘制位置
                    PLANE_WIDTH / 2, PLANE_HEIGHT / 2 // 缩小显示（避免过大）
                );
            } else {
                // 图片加载失败：降级绘制默认图形（兼容）
                ctx.fillStyle = '#4ade80';
                ctx.beginPath();
                ctx.arc(bird.x, startPlaneY + floatY, BIRD_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.arc(bird.x - 6, startPlaneY + floatY - 3, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // 绘制游戏中的飞机
        function drawPlayingPlane() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation * Math.PI / 180);

            if (planeImg.complete && !planeImg.error) {
                // 绘制飞机图片（居中对齐）
                ctx.drawImage(
                    planeImg,
                    -PLANE_WIDTH / 4, -PLANE_HEIGHT / 4, // 偏移使图片中心在bird坐标
                    PLANE_WIDTH / 2, PLANE_HEIGHT / 2
                );
            } else {
                // 降级绘制
                ctx.fillStyle = '#4ade80';
                ctx.beginPath();
                ctx.arc(0, 0, BIRD_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.arc(-6, -3, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // 绘制管道（塔）
        function drawPipes() {
            // 此处保留原有管道绘制逻辑（若需要完整代码可补充，核心修改是飞机绘制）
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === GAME_STATE.READY) {
                // 待机状态：绘制开始界面飞机
                drawStartPlane();
                // 绘制开始提示文字
                ctx.fillStyle = '#fff';
                ctx.font = '18px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.fillText('点击屏幕开始游戏', canvas.width / 2, canvas.height / 2 + 100);
            } else if (gameState === GAME_STATE.PLAYING) {
                // 游戏中：绘制飞机和管道
                drawPlayingPlane();
                drawPipes();
            } else if (gameState === GAME_OVER) {
                // 游戏结束：绘制爆炸粒子+飞机+管道
                drawPlayingPlane();
                drawPipes();
                drawParticles();
                // 绘制结束提示
                ctx.fillStyle = '#ff4444';
                ctx.font = '24px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 50);
                ctx.fillStyle = '#fff';
                ctx.font = '16px Microsoft YaHei';
                ctx.fillText('点击屏幕重新开始', canvas.width / 2, canvas.height / 2);
            }

            // 更新粒子（仅结束状态生效）
            if (gameState === GAME_OVER) {
                updateParticles();
            }
        }

        // 游戏更新逻辑
        function update() {
            if (gameState !== GAME_STATE.PLAYING) return;

            frameCount++;
            // 重力更新
            bird.vy += GRAVITY;
            bird.y += bird.vy;
            bird.rotation = Math.min(90, bird.vy * 3); // 飞机旋转角度

            // 管道生成逻辑（保留原有逻辑）
            if (frameCount % PIPE_INTERVAL === 0) {
                const topPipeHeight = Math.random() * (canvas.height - PIPE_GAP - 100) + 20;
                pipes.push({
                    x: canvas.width,
                    topHeight: topPipeHeight,
                    bottomY: topPipeHeight + PIPE_GAP,
                    scored: false
                });
            }

            // 管道移动逻辑
            for (let i = pipes.length - 1; i >= 0; i--) {
                const pipe = pipes[i];
                pipe.x -= PIPE_SPEED;

                // 移除超出屏幕的管道
                if (pipe.x < -PIPE_W) {
                    pipes.splice(i, 1);
                    continue;
                }

                // 计分逻辑
                if (!pipe.scored && pipe.x + PIPE_W < bird.x) {
                    pipe.scored = true;
                    score++;
                    scoreDisplay.textContent = `🏆 ${score}`;
                    if (score > best) {
                        best = score;
                        localStorage.setItem('flappyBest', best);
                        bestDisplay.textContent = `👑 ${best}`;
                    }
                }

                // 碰撞检测（保留原有逻辑）
                const birdRect = {
                    x: bird.x - BIRD_RADIUS,
                    y: bird.y - BIRD_RADIUS,
                    width: BIRD_RADIUS * 2,
                    height: BIRD_RADIUS * 2
                };
                const pipeTopRect = {
                    x: pipe.x,
                    y: 0,
                    width: PIPE_W,
                    height: pipe.topHeight
                };
                const pipeBottomRect = {
                    x: pipe.x,
                    y: pipe.bottomY,
                    width: PIPE_W,
                    height: canvas.height - pipe.bottomY
                };

                // 碰撞判定
                if (
                    bird.y - BIRD_RADIUS < 0 || 
                    bird.y + BIRD_RADIUS > canvas.height ||
                    collide(birdRect, pipeTopRect) || 
                    collide(birdRect, pipeBottomRect)
                ) {
                    gameOver();
                    return;
                }
            }
        }

        // 碰撞检测辅助函数
        function collide(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 游戏结束逻辑
        function gameOver() {
            gameState = GAME_STATE.GAME_OVER;
            createExplosion(bird.x, bird.y); // 创建爆炸效果
        }

        // 游戏主循环
        function loop() {
            update();
            draw();
            animId = requestAnimationFrame(loop);
        }

        // 触发飞行（点击/空格）
        function flap() {
            if (gameState === GAME_STATE.READY) {
                // 待机状态：开始游戏
                gameState = GAME_STATE.PLAYING;
                loop();
            } else if (gameState === GAME_STATE.PLAYING) {
                // 游戏中：飞机上升
                bird.vy = FLAP;
                bird.rotation = -20; // 抬头角度
            } else if (gameState === GAME_STATE.GAME_OVER) {
                // 结束状态：重新初始化
                init();
            }
        }

        // 绑定输入事件
        canvas.addEventListener('click', flap);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });

        // 初始化游戏
        init();
    </script>
</body>
</html>
