<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- 手机适配核心 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Plane</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        body {
            background: #1a1a2e;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #header {
            width: 92%;
            max-width: 420px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        #title { 
            color: #4ade80; 
            font-size: 18px; 
            text-decoration: none; 
        }
        #backBtn {
            background: #4a4a6a; 
            color: #fff; 
            border: none;
            padding: 6px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px;
            text-decoration: none;
        }
        #infoBar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 10px;
            width: 92%;
            max-width: 420px;
        }
        #scoreDisplay, #bestDisplay {
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 6px 20px;
            color: #4ade80;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        #bestDisplay { color: #fbbf24; }

        /* 画布自适应，等比例缩放 */
        #gameCanvas {
            border: 2px solid #3a3a5a;
            border-radius: 10px;
            display: block;
            /* 手机自动缩放到屏幕宽度 */
            max-width: 92vw;
            height: auto;
            cursor: pointer;
            touch-action: none; /* 禁止手机滑动默认行为 */
        }
        #hint {
            color: #888;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="header">
        <a href="index.html" id="title">← 游戏中心</a>
        <a href="index.html" id="backBtn">返回主页</a>
    </div>
    <div id="infoBar">
        <div id="scoreDisplay">🏆 0</div>
        <div id="bestDisplay">👑 0</div>
    </div>

    <canvas id="gameCanvas" width="400" height="560"></canvas>

    <div id="hint">
        点击 或 空格键 让飞机飞起来
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');

const GRAVITY = 0.3;
const FLAP = -6.5;
const PIPE_GAP = 165;
const PIPE_SPEED = 2.5;
const PIPE_INTERVAL = 110;

const PLANE_IMG_SRC = '飞机_clean.png';
const TOWER_IMG_SRC = '塔_nobg.png';

const PLANE_W = 70;
const PLANE_H = 35;
const BIRD_RADIUS = 18;
const TOWER_W = 60;

const planeImg = new Image();
const towerImg = new Image();
planeImg.src = PLANE_IMG_SRC;
towerImg.src = TOWER_IMG_SRC;

let bird, pipes, score, best, gameState;
let frameCount = 0;
let startFloat = 0;
let animId;
let particles = [];

const GAME_STATE = {
    READY: 'ready',
    PLAYING: 'playing',
    GAME_OVER: 'gameOver'
};

best = +localStorage.getItem('flappyBest') || 0;
bestDisplay.textContent = `👑 ${best}`;

// 爆炸粒子
function createExplosion(x,y){
    particles = [];
    for(let i=0;i<15;i++){
        let ang = Math.random()*Math.PI*2;
        let spd = 1+Math.random()*2;
        particles.push({
            x:x, y:y,
            vx:Math.cos(ang)*spd,
            vy:Math.sin(ang)*spd,
            r:3+Math.random()*4,
            life:1,
            decay:0.025
        });
    }
}
function updateParticles(){
    for(let i=particles.length-1;i>=0;i--){
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if(p.life<=0) particles.splice(i,1);
    }
}
function drawParticles(){
    for(let p of particles){
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = "#ff6633";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

function init() {
    bird = { x: 70, y: canvas.height / 2, vy: 0, rot: 0 };
    pipes = [];
    score = 0;
    frameCount = 0;
    particles = [];
    gameState = GAME_STATE.READY;
    scoreDisplay.textContent = `🏆 0`;
    cancelAnimationFrame(animId);
    loop();
}

function drawReadyPlane() {
    startFloat += 0.06;
    let fy = Math.sin(startFloat) * 6;
    let x = bird.x - PLANE_W / 2;
    let y = bird.y + fy - PLANE_H / 2;
    ctx.drawImage(planeImg, x, y, PLANE_W, PLANE_H);
}

function drawPlane() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot * Math.PI / 180);
    ctx.drawImage(planeImg, -PLANE_W / 2, -PLANE_H / 2, PLANE_W, PLANE_H);
    ctx.restore();
}

// 上塔倒置 下塔正常
function drawPipes() {
    for(let p of pipes){
        ctx.save();
        ctx.translate(p.x + TOWER_W/2, p.topH);
        ctx.scale(1, -1);
        ctx.drawImage(towerImg, -TOWER_W/2, 0, TOWER_W, p.topH);
        ctx.restore();

        ctx.drawImage(towerImg, p.x, p.bottomY, TOWER_W, canvas.height - p.bottomY);
    }
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(gameState === GAME_STATE.READY){
        drawReadyPlane();
        ctx.fillStyle = '#fff';
        ctx.font = '18px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('点击开始游戏', canvas.width/2, canvas.height/2 + 100);
    }else if(gameState === GAME_STATE.PLAYING){
        drawPipes();
        drawPlane();
    }else if(gameState === GAME_STATE.GAME_OVER){
        drawPipes();
        drawPlane();
        drawParticles();
        ctx.fillStyle = '#ff5555';
        ctx.font = '24px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 40);
        ctx.fillStyle = '#fff';
        ctx.font = '16px Microsoft YaHei';
        ctx.fillText('点击重新开始', canvas.width/2, canvas.height/2);
    }
}

function update() {
    if(gameState !== GAME_STATE.PLAYING) return;
    frameCount++;

    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.rot = Math.min(80, bird.vy * 2.5);

    if(frameCount % PIPE_INTERVAL === 0){
        let topH = Math.random() * (canvas.height - PIPE_GAP - 120) + 30;
        pipes.push({
            x: canvas.width,
            topH: topH,
            bottomY: topH + PIPE_GAP,
            scored: false
        });
    }

    for(let i = pipes.length - 1; i >= 0; i--){
        let p = pipes[i];
        p.x -= PIPE_SPEED;
        if(p.x < -TOWER_W){
            pipes.splice(i,1);
            continue;
        }

        if(!p.scored && p.x + TOWER_W < bird.x){
            p.scored = true;
            score++;
            scoreDisplay.textContent = `🏆 ${score}`;
            if(score > best){
                best = score;
                localStorage.setItem('flappyBest', best);
                bestDisplay.textContent = `👑 ${best}`;
            }
        }

        let bx = bird.x - BIRD_RADIUS;
        let by = bird.y - BIRD_RADIUS;
        let bw = BIRD_RADIUS * 2;
        let bh = BIRD_RADIUS * 2;

        if(
            bird.y - BIRD_RADIUS < 0 ||
            bird.y + BIRD_RADIUS > canvas.height ||
            (bx < p.x + TOWER_W && bx + bw > p.x && by < p.topH) ||
            (bx < p.x + TOWER_W && bx + bw > p.x && by + bh > p.bottomY)
        ){
            gameOver();
            return;
        }
    }
}

function gameOver(){
    gameState = GAME_STATE.GAME_OVER;
    createExplosion(bird.x, bird.y);
}

function loop() {
    update();
    if(gameState === GAME_STATE.GAME_OVER) updateParticles();
    draw();
    animId = requestAnimationFrame(loop);
}

function flap(){
    if(gameState === GAME_STATE.READY){
        gameState = GAME_STATE.PLAYING;
    }else if(gameState === GAME_STATE.PLAYING){
        bird.vy = FLAP;
        bird.rot = -20;
    }else if(gameState === GAME_STATE.GAME_OVER){
        init();
    }
}

// 手机点击、电脑点击
canvas.addEventListener('click', flap);
// 手机触摸也生效
canvas.addEventListener('touchstart', e=>{
    e.preventDefault();
    flap();
});
// 电脑空格
document.addEventListener('keydown', e=>{
    if(e.code === 'Space'){
        e.preventDefault();
        flap();
    }
});

init();
</script>
</body>
</html>
