<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Plane</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 420px;
            margin-bottom: 14px;
        }
        #title { color: #4ade80; font-size: 22px; text-decoration: none; }
        #backBtn {
            background: #4a4a6a; color: #fff; border: none;
            padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px;
            text-decoration: none;
        }
        canvas {
            border: 2px solid #3a3a5a;
            border-radius: 10px;
            display: block;
            cursor: pointer;
        }
        #infoBar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 420px;
        }
        #scoreDisplay, #bestDisplay {
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 8px 24px;
            color: #4ade80;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }
        #bestDisplay { color: #fbbf24; }
        #hint {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="header">
        <a href="index.html" id="title">← 游戏中心</a>
        <a href="index.html" id="backBtn">返回主页</a>
    </div>
    <div id="infoBar">
        <div id="scoreDisplay">🏆 0</div>
        <div id="bestDisplay">👑 0</div>
    </div>
    <canvas id="gameCanvas" width="400" height="560"></canvas>
    <div id="hint">
        <span>点击</span> 或 <span>空格键</span> 让飞机飞起来
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');

const GRAVITY = 0.3;
const FLAP = -6.5;
const PIPE_GAP = 165;
const PIPE_SPEED = 2.5;
const PIPE_INTERVAL = 110;

// 图片名保持不变
const PLANE_IMG_SRC = '飞机_clean.png';
const TOWER_IMG_SRC = '塔_nobg.png';

// 飞机尺寸
const PLANE_W = 70;
const PLANE_H = 35;
const BIRD_RADIUS = 18;

// 塔宽度
const TOWER_W = 60;

// 加载图片
const planeImg = new Image();
const towerImg = new Image();
planeImg.src = PLANE_IMG_SRC;
towerImg.src = TOWER_IMG_SRC;

let bird, pipes, score, best, gameState;
let frameCount = 0;
let startFloat = 0;
let animId;

const GAME_STATE = {
    READY: 'ready',
    PLAYING: 'playing',
    GAME_OVER: 'gameOver'
};

best = +localStorage.getItem('flappyBest') || 0;
bestDisplay.textContent = `👑 ${best}`;

function init() {
    bird = { x: 70, y: canvas.height / 2, vy: 0, rot: 0 };
    pipes = [];
    score = 0;
    frameCount = 0;
    gameState = GAME_STATE.READY;
    scoreDisplay.textContent = `🏆 0`;
    cancelAnimationFrame(animId);
    loop();
}

// 待机飞机
function drawReadyPlane() {
    startFloat += 0.06;
    let fy = Math.sin(startFloat) * 6;
    let x = bird.x - PLANE_W / 2;
    let y = bird.y + fy - PLANE_H / 2;
    ctx.drawImage(planeImg, x, y, PLANE_W, PLANE_H);
}

// 游戏飞机
function drawPlane() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot * Math.PI / 180);
    ctx.drawImage(planeImg, -PLANE_W / 2, -PLANE_H / 2, PLANE_W, PLANE_H);
    ctx.restore();
}

// 关键：上塔翻转倒置，下塔正常
function drawPipes() {
    for(let p of pipes){
        // 上塔：垂直翻转倒过来
        ctx.save();
        ctx.translate(p.x + TOWER_W/2, p.topH);
        ctx.scale(1, -1); // 垂直翻转
        ctx.drawImage(towerImg, -TOWER_W/2, 0, TOWER_W, p.topH);
        ctx.restore();

        // 下塔：正常正向
        ctx.drawImage(towerImg, p.x, p.bottomY, TOWER_W, canvas.height - p.bottomY);
    }
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(gameState === GAME_STATE.READY){
        drawReadyPlane();
        ctx.fillStyle = '#fff';
        ctx.font = '18px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('点击开始游戏', canvas.width/2, canvas.height/2 + 100);
    }else if(gameState === GAME_STATE.PLAYING){
        drawPipes();
        drawPlane();
    }else if(gameState === GAME_STATE.GAME_OVER){
        drawPipes();
        drawPlane();
        ctx.fillStyle = '#ff5555';
        ctx.font = '24px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 40);
        ctx.fillStyle = '#fff';
        ctx.font = '16px Microsoft YaHei';
        ctx.fillText('点击重新开始', canvas.width/2, canvas.height/2);
    }
}

function update() {
    if(gameState !== GAME_STATE.PLAYING) return;
    frameCount++;

    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.rot = Math.min(80, bird.vy * 2.5);

    if(frameCount % PIPE_INTERVAL === 0){
        let topH = Math.random() * (canvas.height - PIPE_GAP - 120) + 30;
        pipes.push({
            x: canvas.width,
            topH: topH,
            bottomY: topH + PIPE_GAP,
            scored: false
        });
    }

    for(let i = pipes.length - 1; i >= 0; i--){
        let p = pipes[i];
        p.x -= PIPE_SPEED;
        if(p.x < -TOWER_W){
            pipes.splice(i,1);
            continue;
        }

        if(!p.scored && p.x + TOWER_W < bird.x){
            p.scored = true;
            score++;
            scoreDisplay.textContent = `🏆 ${score}`;
            if(score > best){
                best = score;
                localStorage.setItem('flappyBest', best);
                bestDisplay.textContent = `👑 ${best}`;
            }
        }

        let bx = bird.x - BIRD_RADIUS;
        let by = bird.y - BIRD_RADIUS;
        let bw = BIRD_RADIUS * 2;
        let bh = BIRD_RADIUS * 2;

        if(
            bird.y - BIRD_RADIUS < 0 ||
            bird.y + BIRD_RADIUS > canvas.height ||
            (bx < p.x + TOWER_W && bx + bw > p.x && by < p.topH) ||
            (bx < p.x + TOWER_W && bx + bw > p.x && by + bh > p.bottomY)
        ){
            gameOver();
            return;
        }
    }
}

function gameOver(){
    gameState = GAME_STATE.GAME_OVER;
}

function loop() {
    update();
    draw();
    animId = requestAnimationFrame(loop);
}

function flap(){
    if(gameState === GAME_STATE.READY){
        gameState = GAME_STATE.PLAYING;
    }else if(gameState === GAME_STATE.PLAYING){
        bird.vy = FLAP;
        bird.rot = -20;
    }else if(gameState === GAME_STATE.GAME_OVER){
        init();
    }
}

canvas.addEventListener('click', flap);
document.addEventListener('keydown', e=>{
    if(e.code === 'Space'){
        e.preventDefault();
    }
});

init();
</script>
</body>
</html>
