<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            min-height: 100vh;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 640px;
            margin-bottom: 12px;
        }
        #title { color: #4ade80; font-size: 22px; text-decoration: none; }
        #backBtn {
            background: #4a4a6a; color: #fff; border: none;
            padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px;
            text-decoration: none; transition: background 0.2s;
        }
        #backBtn:hover { background: #6b6b8a; }

        /* 模式选择 */
        #modeBar {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .modeBtn {
            padding: 6px 16px;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            background: #1e1e38;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .modeBtn:hover { background: #2a2a4a; color: #ccc; }
        .modeBtn.active {
            background: #4ade80;
            color: #1a1a2e;
            border-color: #4ade80;
            font-weight: bold;
        }

        #infoBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 640px;
            margin-bottom: 10px;
            padding: 0 4px;
        }
        #mineCount, #timer {
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            padding: 6px 16px;
            color: #f87171;
            font-size: 18px;
            font-weight: bold;
            min-width: 70px;
            text-align: center;
        }
        #timer { color: #4ade80; }
        #board {
            display: grid;
            border: 2px solid #3a3a5a;
            border-radius: 6px;
            overflow: hidden;
            user-select: none;
        }
        .cell {
            width: 26px;
            height: 26px;
            background: #2a2a4a;
            border: 1px solid #1e1e3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.1s;
        }
        .cell:hover:not(.revealed):not(.mine) { background: #3a3a6a; }
        .cell.revealed { background: #13132a; cursor: default; }
        .cell.mine { background: #f87171; }
        .cell.flag { background: #2a2a4a; }
        .cell.flag::after { content: '🚩'; }
        .cell.question { background: #2a2a4a; }
        .cell.question::after { content: '?'; color: #fbbf24; font-size: 15px; }
        .cell.n1 { color: #60a5fa; }
        .cell.n2 { color: #34d399; }
        .cell.n3 { color: #f87171; }
        .cell.n4 { color: #a78bfa; }
        .cell.n5 { color: #fbbf24; }
        .cell.n6 { color: #22d3ee; }
        .cell.n7 { color: #f472b6; }
        .cell.n8 { color: #9ca3af; }
        #hint { color: #555; font-size: 12px; margin-top: 10px; text-align: center; }
        #hint span { color: #888; }
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #overlay.show { display: flex; }
        #overlayBox {
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 16px;
            padding: 40px 50px;
            text-align: center;
        }
        #overlayBox .icon { font-size: 52px; margin-bottom: 14px; }
        #overlayBox p { color: #ccc; font-size: 18px; margin-bottom: 8px; }
        #overlayBox .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
        #restartBtn {
            background: #4ade80; color: #1a1a2e; border: none;
            padding: 11px 36px; font-size: 15px; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        #restartBtn:hover { background: #22c55e; }
    </style>
</head>
<body>
    <div id="header">
        <a href="index.html" id="title">← 游戏中心</a>
        <a href="index.html" id="backBtn">返回主页</a>
    </div>

    <div id="modeBar">
        <button class="modeBtn" data-mode="small">小</button>
        <button class="modeBtn active" data-mode="medium">中</button>
        <button class="modeBtn" data-mode="large">大</button>
    </div>

    <div id="infoBar">
        <div id="mineCount">💣 40</div>
        <button id="restartBtn" style="background:#4ade80;color:#1a1a2e;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:bold;">重新开始</button>
        <div id="timer">⏱ 0</div>
    </div>

    <div id="board"></div>
    <div id="hint">
        <span>左键</span> 翻开 · <span>右键</span> 标记旗帜（循环：旗帜 → 问号 → 清除）
    </div>

    <div id="overlay">
        <div id="overlayBox">
            <div class="icon" id="overlayIcon">💥</div>
            <p id="overlayText">游戏结束</p>
            <div class="sub" id="overlaySub">用时 0 秒</div>
            <button id="restartBtn2" onclick="initGame(true)">再来一局</button>
        </div>
    </div>

    <script>
        // 难度配置：小(9x9/10)、中(16x16/40)、大(16x30/99)
        const MODES = {
            small:  { rows: 9,  cols: 9,  mines: 10,  label: '小' },
            medium: { rows: 16, cols: 16, mines: 40,  label: '中' },
            large:  { rows: 16, cols: 30, mines: 99,  label: '大' }
        };

        function getStorageKey() { return 'minesweeper_save_' + currentMode; }
        let ROWS, COLS, MINES;
        let board = [], revealed = [], flagged = [], questions = [], mineSet = new Set();
        let gameOver = false, gameWon = false, timerInterval = null, seconds = 0, timerStarted = false;
        let flagCount = 0;
        let currentMode = 'medium';

        const boardEl = document.getElementById('board');
        const overlay = document.getElementById('overlay');
        const overlayIcon = document.getElementById('overlayIcon');
        const overlayText = document.getElementById('overlayText');
        const overlaySub = document.getElementById('overlaySub');
        const mineCountEl = document.getElementById('mineCount');
        const timerEl = document.getElementById('timer');
        const restartBtn = document.getElementById('restartBtn');
        const restartBtn2 = document.getElementById('restartBtn2');
        const modeBtns = document.querySelectorAll('.modeBtn');

        // 获取当前模式对应的存档 key
        function getStorageKey() {
            return `minesweeper_save_${currentMode}`;
        }

        function setCellSize() {
            const mode = MODES[currentMode];
            // 统一格子大小为 26px，避免分散感
            boardEl.style.gridTemplateColumns = `repeat(${mode.cols}, 26px)`;
        }

        function saveGame() {
            const saveData = {
                board: board, revealed: revealed, flagged: flagged, questions: questions,
                mineSet: Array.from(mineSet), flagCount: flagCount,
                seconds: seconds, timerStarted: timerStarted,
                gameOver: gameOver, gameWon: gameWon, currentMode: currentMode
            };
            localStorage.setItem(getStorageKey(), JSON.stringify(saveData));
        }

        function loadGame() {
            const saved = localStorage.getItem(getStorageKey());
            if (!saved) return false;
            try {
                const data = JSON.parse(saved);
                if (!MODES[data.currentMode]) return false;
                currentMode = data.currentMode;
                ROWS = MODES[currentMode].rows;
                COLS = MODES[currentMode].cols;
                MINES = MODES[currentMode].mines;
                board = data.board; revealed = data.revealed;
                flagged = data.flagged;
                questions = data.questions || Array.from({length: ROWS}, () => Array(COLS).fill(false));
                mineSet = new Set(data.mineSet);
                flagCount = data.flagCount; seconds = data.seconds;
                timerStarted = data.timerStarted;
                gameOver = data.gameOver; gameWon = data.gameWon;
                updateModeButtons();
                return true;
            } catch (e) { return false; }
        }

        function updateModeButtons() {
            modeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === currentMode);
            });
        }

        function initGame(clearSave = true) {
            if (clearSave) localStorage.removeItem(getStorageKey());
            gameOver = false; gameWon = false;
            seconds = 0; flagCount = 0; timerStarted = false;
            clearInterval(timerInterval);
            timerEl.textContent = '⏱ 0';
            overlay.classList.remove('show');

            ROWS = MODES[currentMode].rows;
            COLS = MODES[currentMode].cols;
            MINES = MODES[currentMode].mines;

            board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
            revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            flagged = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            questions = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            mineSet.clear();
            setCellSize();
            renderBoard();
            updateMineCount();
        }

        function placeMines(excludeR, excludeC) {
            const exclude = new Set();
            for (let dr = -1; dr <= 1; dr++)
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = excludeR + dr, nc = excludeC + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) exclude.add(`${nr},${nc}`);
                }
            while (mineSet.size < MINES) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                const key = `${r},${c}`;
                if (!mineSet.has(key) && !exclude.has(key)) {
                    mineSet.add(key); board[r][c] = -1;
                }
            }
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS; c++)
                    if (board[r][c] !== -1) {
                        let cnt = 0;
                        for (let dr = -1; dr <= 1; dr++)
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) cnt++;
                            }
                        board[r][c] = cnt;
                    }
        }

        function reveal(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            if (revealed[r][c] || flagged[r][c]) return;
            revealed[r][c] = true;
            // 清除问号标记
            if (questions[r][c]) {
                questions[r][c] = false;
            }
            saveGame();
            if (board[r][c] === -1) { endGame(false); return; }
            if (board[r][c] === 0)
                for (let dr = -1; dr <= 1; dr++)
                    for (let dc = -1; dc <= 1; dc++) reveal(r + dr, c + dc);
            checkWin();
        }

        // 右键循环：空 → 旗帜 → 问号 → 空
        function toggleFlag(r, c, e) {
            e.preventDefault();
            if (revealed[r][c] || gameOver) return;

            if (!flagged[r][c] && !questions[r][c]) {
                // 当前无标记 → 插旗帜
                flagged[r][c] = true;
                flagCount++;
            } else if (flagged[r][c]) {
                // 旗帜 → 问号
                flagged[r][c] = false;
                questions[r][c] = true;
            } else if (questions[r][c]) {
                // 问号 → 清除
                questions[r][c] = false;
                flagCount--;
            }
            updateMineCount();
            saveGame();
            renderCell(r, c);
        }

        function updateMineCount() {
            mineCountEl.textContent = `💣 ${MINES - flagCount}`;
        }

        function checkWin() {
            let unrevealedSafe = 0;
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS; c++)
                    if (!revealed[r][c] && board[r][c] !== -1) unrevealedSafe++;
            if (unrevealedSafe === 0) endGame(true);
        }

        function endGame(won) {
            gameOver = true; clearInterval(timerInterval);
            localStorage.removeItem(getStorageKey());
            if (won) {
                gameWon = true; overlayIcon.textContent = '🏆';
                overlayText.textContent = '恭喜通关！';
                overlaySub.textContent = `用时 ${seconds} 秒`;
            } else {
                overlayIcon.textContent = '💥';
                overlayText.textContent = '踩到雷了！';
                overlaySub.textContent = `用时 ${seconds} 秒`;
                for (const key of mineSet) {
                    const [r, c] = key.split(',').map(Number);
                    revealed[r][c] = true;
                }
            }
            renderBoard();
            setTimeout(() => overlay.classList.add('show'), 300);
        }

        function startTimer() {
            timerStarted = true;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++; timerEl.textContent = `⏱ ${seconds}`; saveGame();
            }, 1000);
        }

        function renderCell(r, c) {
            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
            if (!cell) return;
            cell.className = 'cell'; cell.textContent = '';
            if (revealed[r][c]) {
                cell.classList.add('revealed');
                if (board[r][c] === -1) { cell.classList.add('mine'); cell.textContent = '💣'; }
                else if (board[r][c] > 0) { cell.classList.add(`n${board[r][c]}`); cell.textContent = board[r][c]; }
            } else if (flagged[r][c]) {
                cell.classList.add('flag');
            } else if (questions[r][c]) {
                cell.classList.add('question');
            }
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r; cell.dataset.c = c;
                    if (revealed[r][c]) {
                        cell.classList.add('revealed');
                        if (board[r][c] === -1) { cell.classList.add('mine'); cell.textContent = '💣'; }
                        else if (board[r][c] > 0) { cell.classList.add(`n${board[r][c]}`); cell.textContent = board[r][c]; }
                    } else if (flagged[r][c]) {
                        cell.classList.add('flag');
                    } else if (questions[r][c]) {
                        cell.classList.add('question');
                    }
                    cell.addEventListener('click', handleClick);
                    cell.addEventListener('contextmenu', (e) => toggleFlag(r, c, e));
                    boardEl.appendChild(cell);
                }
        }

        function handleClick(e) {
            if (gameOver) return;
            const r = +e.target.dataset.r, c = +e.target.dataset.c;
            if (revealed[r][c] || flagged[r][c]) return;
            if (mineSet.size === 0) placeMines(r, c);
            if (!timerStarted) startTimer();
            reveal(r, c); renderBoard();
        }

        // 模式切换
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.mode === currentMode) return;
                // 先保存当前模式
                if (!gameOver && timerStarted) saveGame();
                clearInterval(timerInterval);
                // 切换到新模式
                currentMode = btn.dataset.mode;
                updateModeButtons();
                // 加载新模式的存档或初始化
                if (!loadGame()) {
                    ROWS = MODES[currentMode].rows;
                    COLS = MODES[currentMode].cols;
                    MINES = MODES[currentMode].mines;
                    setCellSize();
                    initGame();
                } else {
                    setCellSize();
                    renderBoard();
                    updateMineCount();
                    timerEl.textContent = `⏱ ${seconds}`;
                    if (timerStarted && !gameOver) startTimer();
                    if (gameOver) setTimeout(() => overlay.classList.add('show'), 300);
                }
            });
        });

        window.addEventListener('beforeunload', () => { if (!gameOver && timerStarted) saveGame(); });

        // 页面可见性变化时保存（如切换标签页、最小化、切换应用）
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && !gameOver && timerStarted) {
                saveGame();
            }
        });

        if (!loadGame()) {
            ROWS = MODES[currentMode].rows;
            COLS = MODES[currentMode].cols;
            MINES = MODES[currentMode].mines;
            updateModeButtons();
            setCellSize();
            initGame();
        } else {
            setCellSize();
            renderBoard(); updateMineCount();
            timerEl.textContent = `⏱ ${seconds}`;
            if (timerStarted && !gameOver) startTimer();
            if (gameOver) setTimeout(() => overlay.classList.add('show'), 300);
        }

        restartBtn.addEventListener('click', () => initGame(true));
        restartBtn2.addEventListener('click', () => initGame(true));
    </script>
</body>
</html>
