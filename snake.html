<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 20px;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        #title {
            color: #4ade80;
            font-size: 24px;
        }
        #backBtn {
            background: #4a4a6a;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        #backBtn:hover {
            background: #6b6b8a;
        }
        #info {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 15px;
            color: #fff;
            font-size: 18px;
        }
        #score {
            color: #4ade80;
        }
        #lives {
            color: #f87171;
        }
        #gameWrapper {
            position: relative;
            border: 2px solid #4a4a6a;
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #0f0f23;
        }
        #btnContainer {
            margin-top: 20px;
        }
        #startBtn {
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 12px 50px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #startBtn:hover {
            background: #22c55e;
        }
        #startBtn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        #hint {
            color: #888;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="header">
        <span id="title">🐍 贪吃蛇</span>
        <a href="index.html" id="backBtn">← 返回</a>
    </div>
    
    <div id="info">
        <span id="score">得分: 0</span>
        <span id="lives">❤️❤️❤️</span>
    </div>
    
    <div id="gameWrapper">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="btnContainer">
        <button id="startBtn">开始游戏</button>
    </div>
    <div id="hint">使用方向键 ↑↓←→ 控制蛇移动</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const startBtn = document.getElementById('startBtn');

        // 适配屏幕大小
        const GRID_SIZE = 20;
        const GRID_COLS = 30;
        const GRID_ROWS = 25;
        
        canvas.width = GRID_COLS * GRID_SIZE;
        canvas.height = GRID_ROWS * GRID_SIZE;

        let snake = [];
        let food = {};
        let dx = 0, dy = 0;
        let score = 0;
        let lives = 3;
        let isRunning = false;
        let gameInterval = null;

        function drawGrid() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线（可选，增加视觉效果）
            ctx.strokeStyle = '#1a1a3a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= GRID_ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((seg, i) => {
                ctx.fillStyle = i === 0 ? '#22c55e' : '#4ade80';
                ctx.fillRect(seg.x * GRID_SIZE + 1, seg.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);
            });
        }

        function drawFood() {
            ctx.fillStyle = '#f87171';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * GRID_COLS),
                    y: Math.floor(Math.random() * GRID_ROWS)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function resetSnake() {
            const cx = Math.floor(GRID_COLS / 2);
            const cy = Math.floor(GRID_ROWS / 2);
            snake = [
                {x: cx, y: cy},
                {x: cx - 1, y: cy},
                {x: cx - 2, y: cy}
            ];
            dx = 1;
            dy = 0;
        }

        function updateLives() {
            livesEl.textContent = '❤️'.repeat(lives);
        }

        function initGame() {
            score = 0;
            lives = 3;
            scoreEl.textContent = '得分: 0';
            updateLives();
            resetSnake();
            spawnFood();
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameInterval);
            startBtn.disabled = false;
            startBtn.textContent = '开始游戏';
            
            drawGrid();
            ctx.fillStyle = '#f87171';
            ctx.font = '32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = '#4ade80';
            ctx.font = '24px Arial';
            ctx.fillText(`最终得分: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillStyle = '#888';
            ctx.font = '16px Arial';
            ctx.fillText('点击"开始游戏"重新开始', canvas.width / 2, canvas.height / 2 + 55);
        }

        function loseLife() {
            lives--;
            updateLives();
            if (lives <= 0) {
                gameOver();
            } else {
                const cx = Math.floor(GRID_COLS / 2);
                const cy = Math.floor(GRID_ROWS / 2);
                const currentLength = snake.length;
                snake = [];
                for (let i = 0; i < currentLength; i++) {
                    snake.push({x: cx - i, y: cy});
                }
                dx = 1;
                dy = 0;
                spawnFood();
            }
        }

        function update() {
            if (!isRunning) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= GRID_COLS || head.y < 0 || head.y >= GRID_ROWS) {
                loseLife();
                return;
            }

            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                loseLife();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function render() {
            drawGrid();
            drawFood();
            drawSnake();
        }

        function gameLoop() {
            update();
            render();
        }

        function startGame() {
            if (isRunning) return;

            isRunning = true;
            startBtn.disabled = true;
            startBtn.textContent = '游戏中...';

            initGame();
            gameInterval = setInterval(gameLoop, 150);
        }

        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);

        // 初始画面
        drawGrid();
        ctx.fillStyle = '#4a4a6a';
        ctx.font = '22px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('点击"开始游戏"开始', canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = '14px Arial';
        ctx.fillText('使用方向键控制', canvas.width / 2, canvas.height / 2 + 20);
    </script>
</body>
</html>
